services:
  - type: web
    name: kirana-agent-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: NODE_VERSION
        value: 22.23.1
